<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body style="background-color: hsl(212, 45%, 89%); font-family: 'Outfit', sans-serif; margin: 0;">
  <div class="container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
    <div class="card" style="background-color: hsl(0, 0%, 100%); border-radius: 25px; box-shadow: 0px 20px 30px rgba(0, 0, 0, 0.1); padding: 20px; max-width: 300px; text-align: center;">
      <img src="./images/image-qr-code.png" alt="QR Code" style="width: 100%; border-radius: 15px;">
      <h2 style="color: hsl(218, 44%, 22%); font-size: 1.5rem; margin-top: 20px;">Improve your front-end skills by building projects</h2>
      <p style="color: hsl(216, 15%, 48%); font-size: 1rem; font-weight: 300; letter-spacing: 0.05em;">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
    </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Bob</a>.
  </footer>
</body>
</html>
